---
name: Build IDE Bundles

on:
  push:
    branches:
      - main
      - feature/rule-structure-refactor
    # Temporarily removed path filters for testing
    # paths:
    #   - 'sources/**'
    #   - 'src/**'
    #   - 'pyproject.toml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Validate unified rules
        run: uv run python src/validate_unified_rules.py

      - name: Convert unified rules to IDE formats
        run: uv run python src/convert_to_ide_formats.py --source core --source owasp

      - name: Package rule bundles
        run: |
          set -euo pipefail
          cd dist
          zip -r ide-rules.zip rules/.cursor rules/.windsurf rules/.github/instructions

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ide-rule-bundles
          path: dist/ide-rules.zip
          retention-days: 14
          if-no-files-found: error

      - name: Attach bundle to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" dist/ide-rules.zip --clobber
